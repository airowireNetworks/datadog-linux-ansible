---
- name: Ensure Datadog Agent service is running
  service:
    name: datadog-agent
    state: started
    enabled: yes

- name: Wait for Datadog Agent API to become available
  wait_for:
    host: 127.0.0.1
    port: 5001
    timeout: 60

- name: Check Datadog Agent status
  command: datadog-agent status
  register: datadog_status
  changed_when: false

- name: Display Datadog Agent status
  debug:
    var: datadog_status.stdout_lines
docserver@mkdocs:~/datadog-linux-ansible/tasks$ ^C
docserver@mkdocs:~/datadog-linux-ansible/tasks$ cat configure.yml
- name: Enable log collection in datadog.yaml
  lineinfile:
    path: /etc/datadog-agent/datadog.yaml
    regexp: '^logs_enabled:'
    line: 'logs_enabled: true'

- name: Update Datadog API key
  lineinfile:
    path: /etc/datadog-agent/datadog.yaml
    regexp: '^api_key:'
    line: "api_key: {{ datadog_api_key }}"

- name: Update Datadog site
  lineinfile:
    path: /etc/datadog-agent/datadog.yaml
    regexp: '^site:'
    line: "site: {{ datadog_site }}"

- name: Add dd-agent to adm group (Ubuntu/Debian)
  user:
    name: dd-agent
    groups: adm
    append: yes
  when: ansible_os_family == "Debian"

- name: Ensure Linux integration directory exists
  file:
    path: /etc/datadog-agent/conf.d/linux.d
    state: directory
    owner: dd-agent
    group: dd-agent
    mode: '0755'

- name: Restart Datadog Agent
  service:
    name: datadog-agent
    state: restarted
